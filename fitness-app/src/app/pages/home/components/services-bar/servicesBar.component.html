
<div class="bg-[#FF4100] py-4 overflow-hidden whitespace-nowrap flex border-y border-white/20">
  
  <div class="animate-marquee flex items-center">
    
    @for (i of [1, 2]; track i) {
      <div class="flex items-center gap-8 px-4">
      @for (item of marqueeItems; track item) {
          <span class="text-white font-bold text-2xl uppercase">{{ item }}</span>
          <span class="text-white text-2xl">✦</span>
        }
      </div>
    }
    
  </div>
</div>
