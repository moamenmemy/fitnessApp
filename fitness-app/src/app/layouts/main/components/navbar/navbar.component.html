<nav
  class="flex items-center justify-between fixed top-0 w-full z-50 py-4 px-12 transition-all duration-300"
  [ngClass]="{
    'bg-transparent text-white': !isScrolled,
    'bg-white/70 backdrop-blur-md shadow-md dark:bg-[#242424]/80 text-[#242424] dark:text-white':
      isScrolled,
  }"
>
  <!-- Logo -->
  <div>
    <img
      src="/logo.png"
      alt="logo"
      class="w-20 transition-transform hover:scale-105"
    />
  </div>

  <!-- Desktop Links -->
  <ul
    class="hidden md:flex items-center gap-8 font-bold"
    [ngClass]="{
      'text-white': !isScrolled,
      'text-[#242424] dark:text-white': isScrolled,
    }"
  >
    @for (link of navLinks; track $index) {
      <li>
        <a
          [routerLink]="link.path"
          routerLinkActive="text-[var(--main-color)]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-[var(--main-color)] transition-colors"
        >
          {{ link.name }}
        </a>
      </li>
    }
  </ul>

  <!-- Desktop Actions -->
  <div class="hidden md:flex items-center gap-4">
    <button
      (click)="_theme.toggleTheme()"
      class="flex items-center text-white justify-center w-10 h-10 rounded-full bg-[var(--main-color)] transition-all active:scale-90"
    >
      <div
        class="transition-transform duration-500"
        [ngClass]="{ 'rotate-[360deg]': _theme.theme() === 'dark' }"
      >
        <fa-icon [icon]="_theme.theme() === 'dark' ? fasun : famoon" />
      </div>
    </button>

    <app-button-ui
      text="LOGIN"
      textcolor="white"
      backgroundcolor="var(--main-color)"
    ></app-button-ui>
    <app-button-ui
      text="SIGN UP"
      textcolor="var(--main-color)"
      backgroundcolor="transparent"
    ></app-button-ui>
  </div>

  <!-- Mobile Buttons -->
  <div class="md:hidden flex items-center gap-4">
    <button
      class="!bg-[#ff4500] hover:bg-[#e63e00] w-12 h-12 rounded-full flex items-center justify-center border-none transition-all shadow-lg text-white"
    >
      <i class="pi pi-user"></i>
    </button>
    <button
      (click)="sidebarVisible = true"
      class="!bg-[#ff4500] hover:bg-[#e63e00] w-12 h-12 rounded-full flex flex-col items-center justify-center gap-[4px] border-none transition-all shadow-lg"
    >
      <span class="w-6 h-[2px] bg-white rounded-full"></span>
      <span class="w-5 h-[2px] bg-white rounded-full self-end mr-[12px]"></span>
      <span class="w-3 h-[2px] bg-white rounded-full self-end mr-[12px]"></span>
    </button>
  </div>
</nav>

<!-- Drawer (Mobile Menu) -->
<p-drawer
  [(visible)]="sidebarVisible"
  position="right"
  [modal]="true"
  styleClass="custom-white-drawer bg-white dark:bg-[#1a1a1a] text-[#1a1a1a] dark:text-white"
>
  <div
    class="p-6 h-full bg-white dark:bg-[#1a1a1a] transition-colors duration-300"
  >
    <div class="flex justify-between items-center pb-6">
      <img src="/logo.png" alt="logo" class="w-32" />
      <button
        (click)="_theme.toggleTheme()"
        class="flex items-center text-white justify-center w-10 h-10 rounded-full bg-[var(--main-color)] transition-all active:scale-90"
      >
        <div
          class="transition-transform duration-500"
          [class.rotate-[360deg]]="_theme.theme() === 'dark'"
        >
          <fa-icon [icon]="_theme.theme() === 'dark' ? fasun : famoon" />
        </div>
      </button>
    </div>

    <ul class="list-none p-0 m-0">
      @for (link of navLinks; track $index) {
        <li
          class="drawer-item transition-colors duration-300 hover:text-[var(--main-color)] text-[#1a1a1a] dark:text-white"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <a
            [routerLink]="link.path"
            (click)="sidebarVisible = false"
            class="transition hover:text-[var(--main-color)] text-inherit block w-full"
          >
            {{ link.name }}
          </a>
        </li>
      }
    </ul>
  </div>
</p-drawer>
